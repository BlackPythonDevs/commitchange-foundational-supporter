<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foundational Supporters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drag-over {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10 px-4">

    <div class="max-w-3xl w-full bg-white rounded-xl shadow-md p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Foundational Supporters CSV Processor</h1>
        
        <div class="mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">View Type</label>
                <div class="flex space-x-4">
                    <label class="inline-flex items-center">
                        <input type="radio" name="mode" value="annual" class="form-radio text-blue-600" checked>
                        <span class="ml-2">Annual Supporters</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="radio" name="mode" value="lifetime" class="form-radio text-blue-600">
                        <span class="ml-2">Lifetime Supporters</span>
                    </label>
                </div>
            </div>
            <div>
                <label for="limit" class="block text-sm font-medium text-gray-700 mb-2">Minimum Contribution ($)</label>
                <input type="number" id="limit" name="limit" value="200" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
            </div>
        </div>

        <div id="drop-zone" class="border-4 border-dashed border-gray-300 rounded-lg p-10 text-center cursor-pointer transition-colors hover:bg-gray-50 flex flex-col items-center justify-center min-h-[200px]">
            <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <p class="text-lg text-gray-600 font-medium">Drag and drop your CSV file here</p>
            <p class="text-sm text-gray-500 mt-2">or click to select a file</p>
            <input type="file" id="file-input" class="hidden" accept=".csv">
        </div>

        <div id="loading" class="hidden mt-8 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <p class="mt-2 text-gray-600">Processing...</p>
        </div>

        <div id="result-container" class="hidden mt-8">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-semibold text-gray-700">Results</h2>
                <button id="copy-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium transition-colors flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                    Copy to Clipboard
                </button>
            </div>
            <div class="bg-gray-800 rounded-lg overflow-hidden">
                <pre class="p-4 text-gray-100 text-sm overflow-x-auto"><code id="json-result"></code></pre>
            </div>
        </div>
        
        <div id="error-message" class="hidden mt-6 p-4 bg-red-100 text-red-700 rounded-lg">
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('result-container');
        const jsonResult = document.getElementById('json-result');
        const copyBtn = document.getElementById('copy-btn');
        const errorMessage = document.getElementById('error-message');

        // Click to upload
        dropZone.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Drag events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('drag-over');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.remove('drag-over');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }, false);

        function handleFile(file) {
            if (!file.name.toLowerCase().endsWith('.csv')) {
                showError('Please upload a CSV file.');
                return;
            }

            hideError();
            resultContainer.classList.add('hidden');
            loading.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', file);
            
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const limit = document.getElementById('limit').value;
            formData.append('mode', mode);
            formData.append('limit', limit);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json().then(data => ({ status: response.status, body: data })))
            .then(res => {
                loading.classList.add('hidden');
                
                if (res.status !== 200) {
                    showError(res.body.error || 'An error occurred during processing.');
                    return;
                }

                // Format JSON and display
                const jsonStr = JSON.stringify(res.body, null, 2);
                jsonResult.textContent = jsonStr;
                resultContainer.classList.remove('hidden');
            })
            .catch(error => {
                loading.classList.add('hidden');
                showError('Network error occurred.');
                console.error(error);
            });
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        // Copy to clipboard
        copyBtn.addEventListener('click', () => {
            const textToCopy = jsonResult.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = `
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    Copied!
                `;
                copyBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                copyBtn.classList.add('bg-green-600', 'hover:bg-green-700');
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                    copyBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                }, 2000);
            }).catch(err => {
                console.error('Could not copy text: ', err);
                alert('Failed to copy to clipboard.');
            });
        });
    </script>
</body>
</html>
